<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CL vs BRENTOIL 日线价差</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    body { margin: 0; font-family: Inter, Arial, sans-serif; background: #0b1020; color: #e5e7eb; }
    .wrap { max-width: 1400px; margin: 0 auto; padding: 24px; }
    h1 { margin: 0 0 8px; font-size: 28px; }
    .sub { color: #94a3b8; margin-bottom: 16px; line-height: 1.6; }
    #chart { width: 100%; height: 920px; background: #111827; border-radius: 16px; }
    .meta { margin: 14px 0 18px; color: #cbd5e1; font-size: 14px; line-height: 1.7; }
    .note { margin-top: 12px; color: #94a3b8; font-size: 13px; }
    a { color: #7dd3fc; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>CL vs BRENTOIL 小时级价差</h1>
    <div class="sub">
      数据来自 Hyperliquid <code>xyz</code> 市场。当前页面默认读取<strong>小时级</strong>数据。
      上图显示 <code>xyz:CL</code> 与 <code>xyz:BRENTOIL</code> 收盘价，中图显示绝对价差（BRENTOIL - CL），下图显示相对价差（相对 CL）。
    </div>
    <div id="meta" class="meta">正在加载数据…</div>
    <div id="chart"></div>
    <div class="note">如果你更新了 <code>data.json</code>，刷新页面即可看到最新图表。</div>
  </div>

  <script>
    async function main() {
      const res = await fetch('./data.json', { cache: 'no-store' });
      const data = await res.json();
      const { meta, series } = data;

      document.getElementById('meta').innerHTML = [
        `数据源：${meta.source}（dex=${meta.dex}）`,
        `更新时间：${meta.updated_at}`,
        `周期：${meta.interval}`,
        `CL 条数：${meta.counts.cl_bars ?? meta.counts.cl_days}`,
        `BRENTOIL 条数：${meta.counts.bren_bars ?? meta.counts.bren_days}`,
        `重叠条数：${meta.counts.overlap_bars ?? meta.counts.overlap_days}`
      ].join(' ｜ ');

      const chart = echarts.init(document.getElementById('chart'));
      chart.setOption({
        backgroundColor: '#111827',
        animation: false,
        color: ['#38bdf8', '#f59e0b', '#22c55e', '#a78bfa'],
        tooltip: {
          trigger: 'axis',
          axisPointer: { type: 'cross' },
          backgroundColor: 'rgba(15,23,42,0.95)',
          borderColor: '#334155',
          textStyle: { color: '#e5e7eb' },
          formatter: (params) => {
            const i = params[0].dataIndex;
            return [
              `<b>${series.buckets[i] ?? series.dates[i]}</b>`,
              `CL：${Number(series.cl_close[i]).toFixed(3)}`,
              `BRENTOIL：${Number(series.bren_close[i]).toFixed(3)}`,
              `绝对价差：${Number(series.spread_abs_bren_minus_cl[i]).toFixed(3)}`,
              `相对价差：${(Number(series.spread_pct_vs_cl[i]) * 100).toFixed(2)}%`
            ].join('<br/>');
          }
        },
        legend: { top: 10, textStyle: { color: '#cbd5e1' } },
        grid: [
          { left: 70, right: 30, top: 60, height: 260 },
          { left: 70, right: 30, top: 380, height: 180 },
          { left: 70, right: 30, top: 620, height: 140 }
        ],
        xAxis: [
          { type: 'category', boundaryGap: false, data: series.buckets ?? series.dates, axisLine: { lineStyle: { color: '#475569' } }, axisLabel: { color: '#94a3b8' } },
          { type: 'category', boundaryGap: false, gridIndex: 1, data: series.buckets ?? series.dates, axisLine: { lineStyle: { color: '#475569' } }, axisLabel: { color: '#94a3b8' } },
          { type: 'category', boundaryGap: false, gridIndex: 2, data: series.buckets ?? series.dates, axisLine: { lineStyle: { color: '#475569' } }, axisLabel: { color: '#94a3b8' } }
        ],
        yAxis: [
          { type: 'value', scale: true, axisLine: { lineStyle: { color: '#475569' } }, splitLine: { lineStyle: { color: '#1e293b' } }, axisLabel: { color: '#94a3b8' } },
          { type: 'value', gridIndex: 1, scale: true, axisLine: { lineStyle: { color: '#475569' } }, splitLine: { lineStyle: { color: '#1e293b' } }, axisLabel: { color: '#94a3b8' } },
          { type: 'value', gridIndex: 2, scale: true, axisLine: { lineStyle: { color: '#475569' } }, splitLine: { lineStyle: { color: '#1e293b' } }, axisLabel: { color: '#94a3b8' }, axisLabelFormatter: '{value}%' }
        ],
        dataZoom: [
          { type: 'inside', xAxisIndex: [0, 1, 2], start: 0, end: 100 },
          { type: 'slider', xAxisIndex: [0, 1, 2], bottom: 40, height: 24, start: 0, end: 100, borderColor: '#334155', backgroundColor: '#0f172a', fillerColor: 'rgba(56,189,248,0.25)', textStyle: { color: '#94a3b8' } }
        ],
        series: [
          { name: 'CL', type: 'line', showSymbol: false, xAxisIndex: 0, yAxisIndex: 0, data: series.cl_close, lineStyle: { width: 2 } },
          { name: 'BRENTOIL', type: 'line', showSymbol: false, xAxisIndex: 0, yAxisIndex: 0, data: series.bren_close, lineStyle: { width: 2 } },
          { name: '绝对价差', type: 'line', showSymbol: false, xAxisIndex: 1, yAxisIndex: 1, data: series.spread_abs_bren_minus_cl, areaStyle: { color: 'rgba(34,197,94,0.18)' }, lineStyle: { width: 2 } },
          { name: '相对价差%', type: 'line', showSymbol: false, xAxisIndex: 2, yAxisIndex: 2, data: series.spread_pct_vs_cl.map(v => Number(v) * 100), areaStyle: { color: 'rgba(167,139,250,0.16)' }, lineStyle: { width: 2 } }
        ]
      });
      window.addEventListener('resize', () => chart.resize());
    }

    main().catch(err => {
      document.getElementById('meta').textContent = '数据加载失败：' + err;
    });
  </script>
</body>
</html>
