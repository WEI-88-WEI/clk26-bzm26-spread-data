      color: ['#38bdf8', '#f59e0b', '#22c55e'],
      tooltip: {
        trigger: 'axis',
        axisPointer: { type: 'cross' },
        backgroundColor: 'rgba(15,23,42,0.95)',
        borderColor: '#334155',
        textStyle: { color: '#e5e7eb' },
        formatter: (params) => {
          const i = params[0].dataIndex;
          return ['<b>' + dates[i] + '</b>', 'CLK26: ' + cl[i].toFixed(2), 'BZM26: ' + bz[i].toFixed(2), '价差: ' + spread[i].toFixed(2)].join('<br/>');
        }
      },
      legend: { top: 10, textStyle: { color: '#cbd5e1' } },
      grid: [
        { left:70,right:30,top:60,height:320 },
        { left:70,right:30,top:430,height:170 }
      ],
      xAxis: [
        { type:'category', boundaryGap:false, data:dates, axisLine:{lineStyle:{color:'#475569'}}, axisLabel:{color:'#94a3b8'} },
        { type:'category', boundaryGap:false, gridIndex:1, data:dates, axisLine:{lineStyle:{color:'#475569'}}, axisLabel:{color:'#94a3b8'} }
      ],
      yAxis: [
        { type:'value', scale:true, axisLine:{lineStyle:{color:'#475569'}}, splitLine:{lineStyle:{color:'#1e293b'}}, axisLabel:{color:'#94a3b8'} },
        { type:'value', gridIndex:1, scale:true, axisLine:{lineStyle:{color:'#475569'}}, splitLine:{lineStyle:{color:'#1e293b'}}, axisLabel:{color:'#94a3b8'} }
      ],
      dataZoom: [
        { type:'inside', xAxisIndex:[0,1], start:70, end:100 },
        { type:'slider', xAxisIndex:[0,1], bottom:40, height:24, start:70, end:100, borderColor:'#334155', backgroundColor:'#0f172a', fillerColor:'rgba(56,189,248,0.25)', textStyle:{color:'#94a3b8'} }
      ],
      series: [
        { name:'CLK26', type:'line', showSymbol:false, xAxisIndex:0, yAxisIndex:0, data:cl, lineStyle:{width:2} },
        { name:'BZM26', type:'line', showSymbol:false, xAxisIndex:0, yAxisIndex:0, data:bz, lineStyle:{width:2} },
        { name:'价差', type:'line', showSymbol:false, xAxisIndex:1, yAxisIndex:1, data:spread, areaStyle:{color:'rgba(34,197,94,0.18)'}, lineStyle:{width:2} }
      ]
    });
    window.addEventListener('resize', () => chart.resize());
  </script>
</body>
</html>
